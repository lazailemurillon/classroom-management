{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/main_page.css' %}">
</head>
<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar d-flex flex-column justify-content-between">

        <div>
            <!-- LOGO PLACEHOLDER -->
            <div class="logo text-center">
                <div class="logo-box"></div>
            </div>

            <!-- MENU -->
            <ul class="nav flex-column text-center">

                <li class="nav-item">
                    <a href="{% url 'dashboard' %}" 
                       class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}" 
                       data-bs-toggle="tooltip" title="Dashboard">
                        <i class="bi bi-grid"></i>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'classroom' %}" 
                       class="nav-link {% if request.path == '/classroom/' %}active{% endif %}" 
                       data-bs-toggle="tooltip" title="Classroom">
                        <i class="bi bi-easel"></i>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'attendance' %}" 
                       class="nav-link {% if request.path == '/attendance/' %}active{% endif %}" 
                       data-bs-toggle="tooltip" title="Attendance">
                        <i class="bi bi-mortarboard"></i>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'schedule' %}" 
                       class="nav-link {% if request.path == '/schedule/' %}active{% endif %}" 
                       data-bs-toggle="tooltip" title="Calendar">
                        <i class="bi bi-calendar"></i>
                    </a>
                </li>

            </ul>
        </div>

        <!-- LOGOUT -->
        <div class="text-center mb-3">
            <a href="#" id="logoutBtn" class="nav-link" data-bs-toggle="tooltip" title="Logout">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content flex-grow-1 p-4">
        {% block content %}
        <!-- Page content will go here -->
        {% endblock %}
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{% static 'js/main_page.js' %}"></script>

</body>
</html>
