{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Management System - Sign Up</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">
    <div class="login-card signup-card">
        <h1>Create Account</h1>
        <p class="subtitle">Sign up to Classroom Management System</p>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Enter your password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <div class="divider">or</div>

        <p class="signup-text">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="django-message" data-message="{{ message }}"></div>
    {% endfor %}
{% endif %}

<script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
